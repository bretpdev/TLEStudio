services:
  tlestudio-mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tlestudio-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      SA_PASSWORD: "TLEStudioSql123!"
    ports:
      - "1435:1433"
    volumes:
      - tlestudio-mssql-data:/var/opt/mssql
    restart: unless-stopped

volumes:
  tlestudio-mssql-data:
